nnection."}},{"@type":"Question","name":"Can I assign different MIDI channels per knob?","acceptedAnswer":{"@type":"Answer","text":"Yes. Every knob has its own MIDI channel assignment. Drive a synth on ch1, a drum machine on ch10, and a reverb unit on ch16 — all from a single bank, simultaneously."}},{"@type":"Question","name":"Is USB MIDI class-compliant — no driver needed?","acceptedAnswer":{"@type":"Answer","text":"Yes. USB MIDI is class-compliant. Plug into Mac, iPad, or any class-compliant host and it works immediately — no driver installation."}},{"@type":"Question","name":"Can I export/import presets to share with others?","acceptedAnswer":{"@type":"Answer","text":"Yes. Export and import preset files to back up your mappings or share them with other Knob16 users."}},{"@type":"Question","name":"Can knobs receive MIDI — for DAW feedback and sync?","acceptedAnswer":{"@type":"Answer","text":"Yes. Knob16 receives CC feedback from your DAW, keeping every knob display in sync with the actual parameter value. The knob is always where the DAW says it is."}},{"@type":"Question","name":"Can I map one knob to multiple CC numbers simultaneously?","acceptedAnswer":{"@type":"Answer","text":"Not directly. Use a group to link multiple knobs and control them in unison."}},{"@type":"Question","name":"Does it send CC values on connect, or only on movement?","acceptedAnswer":{"@type":"Answer","text":"Only on movement. Use a snapshot to push the full bank state at any point."}},{"@type":"Question","name":"What's the CC range — can I invert or limit it per knob?","acceptedAnswer":{"@type":"Answer","text":"Yes. Set a custom min/max range per knob anywhere within 0–127. Inversion is available when the knob is part of a group."}},{"@type":"Question","name":"Can I run multiple instances — two iPhones in the same session?","acceptedAnswer":{"@type":"Answer","text":"Yes — multiple devices work in the same session simultaneously."}},{"@type":"Question","name":"Does Blue Hand work with return tracks and sends, or macro knobs only?","acceptedAnswer":{"@type":"Answer","text":"Blue Hand is part of Live Mode — a dedicated Ableton control surface built into Knob16. It covers three modes: Device (Blue Hand, follows the selected device), Mixer (volume, pan, sends across tracks, including return tracks), and Macros (Rack macro parameters across tracks in configurable layouts)."}},{"@type":"Question","name":"Does it work with hardware synths directly, no Mac in the middle?","acceptedAnswer":{"@type":"Answer","text":"Yes. Connect over Bluetooth LE MIDI directly to any BLE MIDI-capable synth or groovebox. USB works too via a Lightning or USB-C adapter to a class-compliant host. No computer required."}}]}]}</script>
